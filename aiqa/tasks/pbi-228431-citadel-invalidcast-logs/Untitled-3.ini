
## TC-228431-LOG-01 простыми словами

**Задача:** в старых логах **доказать**, что всё шло так: ты **отправил replace** → брокер **прислал отчёт об исполнении (ER)** → у нас в OMS **упало с ошибкой** в конвертере Citadel. Нужна **одна** конкретная заявка, не каша из разных.

---

**Что нужно заранее**  
Знать **когда** это было (по UTC) и хоть что-то одно из «номера» заявки: например **ClOrdID** или **OrderID (тег 37)** из тикета/скрина. Плюс доступ к логам за тот день.

---

**Что делаешь по шагам**

1. **Открываешь Kibana** (поиск по логам), ставишь **узкое время**: за пару минут до и пару минут после того момента, когда была ошибка (или когда пришёл отчёт).

2. **Ищешь** по словам вроде `InvalidCastException` или `MapFromMessageExecution`, или вставляешь **свой** ClOrdID / номер заявки — чтобы в списке остались **только** события **по этой** заявке, а не чужие.

3. Находишь **красную строку** (ошибка), где написано что-то вроде «ошибка при обработке события» и в тексте фигурирует **mdb_citadel_equities** (или ваш маршрут) — это **место падения**.

4. **Листаешь логи чуть раньше по времени** (на том же сервере/процессе): ищешь строку, что **пришло FIX-сообщение** с типом **8** — это как раз **отчёт брокера** по заявке.

5. **Ещё раньше по времени:** ищешь строку, что **ушло FIX-сообщение** с **G** — это **replace** (замена заявки).

6. **Копируешь кусок лога** «как для следователя»: немного строк **до** ошибки, саму ошибку со **stack trace** (цепочка вызовов), чуть **после**. Важно, чтобы в куске был **сырой текст** входящего отчёта (с `35=8`) и было видно **CitadelEqOrderConvertor** в стеке.

---

**Что считается успехом**  
В одном куске лога видно **порядок**: сначала ушло **G** (replace), потом пришло **8** (отчёт), потом **ошибка** с упоминанием **MapFromMessageExecution**.

---

**Что приложить в баг**  
Файл или скрин с этим фрагментом + в описании: **время UTC**, **какой сервер/инстанс**, **версия**, идентификаторы заявки **без лишних личных данных**.

---

**Аналогия**  
Как разбор ДТП по видеорегистратору: нужен не весь месяц записи, а **30 секунд вокруг удара** — сначала поворот (replace), потом столкновение (отчёт брокера), потом сработала подушка (исключение в OMS).