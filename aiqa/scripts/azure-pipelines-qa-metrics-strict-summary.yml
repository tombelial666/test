trigger: none
pr: none

schedules:
  - cron: "0 3 * * 1-5"
    displayName: Weekdays 03:00 UTC strict QA summary
    branches:
      include:
        - main
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  - group: qa-metrics-strict-summary

jobs:
  - job: strict_summary
    displayName: Publish strict summary to Run Summary
    steps:
      - checkout: self

      - task: UsePythonVersion@0
        inputs:
          versionSpec: "3.11"
        displayName: Use Python 3.11

      - script: |
          python -m pip install --upgrade pip
          python -m pip install requests
        displayName: Install dependencies

      - script: |
          python "test/aiqa/scripts/publish_strict_bugs_per_pbi_summary.py" --since "$(date -u +%Y-%m-01)" --until "$(date -u +%Y-%m-%d)"
        env:
          ADO_PAT: $(System.AccessToken)
        displayName: Publish strict Bugs per PBI summary

  - job: strict_artifact_and_notify
    displayName: Publish artifact and send notifications
    dependsOn: strict_summary
    steps:
      - checkout: self

      - task: UsePythonVersion@0
        inputs:
          versionSpec: "3.11"
        displayName: Use Python 3.11

      - script: |
          python -m pip install --upgrade pip
          python -m pip install requests
        displayName: Install dependencies

      - script: |
          python "test/aiqa/scripts/publish_strict_bugs_per_pbi_summary.py" \
            --since "$(date -u +%Y-%m-01)" \
            --until "$(date -u +%Y-%m-%d)" \
            --output "$(Build.ArtifactStagingDirectory)/strict-bugs-per-pbi-summary.md" \
            --no-upload
        env:
          ADO_PAT: $(System.AccessToken)
        displayName: Generate strict summary markdown artifact

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)/strict-bugs-per-pbi-summary.md"
          artifact: "qa-strict-summary"
        displayName: Publish strict summary artifact

      - script: |
          python - <<'PY'
          import os
          import re
          import requests

          path = os.path.join(
              os.environ["BUILD_ARTIFACTSTAGINGDIRECTORY"],
              "strict-bugs-per-pbi-summary.md",
          )
          md = open(path, "r", encoding="utf-8").read()

          def get(pattern: str, default: str) -> str:
              match = re.search(pattern, md)
              return match.group(1).strip() if match else default

          def get_int(pattern: str, default: int = 0) -> int:
              value = get(pattern, str(default))
              try:
                  return int(value)
              except ValueError:
                  return default

          period = get(r"- Period:\s*`([^`]+)`", "unknown")
          metric = get(r"- Metric:\s*`([^`]+)`", "Bugs per PBI (strict linked)")
          value = get(r"- Value:\s*`([^`]+)`", "N/A bugs/PBI")
          numerator = get_int(r"- Numerator:\s*`([^`]+)`", 0)
          denominator = get_int(r"- Denominator:\s*`([^`]+)`", 0)
          status = get(r"- DataStatus:\s*`([^`]+)`", "UNKNOWN")
          signal = get(r"- Signal:\s*`([^`]+)`", "NORMAL")
          trend_health = get(r"- TrendHealth:\s*`([^`]+)`", "n/a")
          trend_value = get(r"- TrendValueDelta:\s*`([^`]+)`", "n/a")
          trend_linked = get(r"- TrendLinkedDelta:\s*`([^`]+)`", "n/a")
          trend_no_parent = get(r"- TrendNoParentDelta:\s*`([^`]+)`", "n/a")
          trend_prod = get(r"- TrendProdDelta:\s*`([^`]+)`", "n/a")

          new_total = get_int(r"- NewBugsTotal:\s*`([^`]+)`", 0)
          linked = get_int(r"- LinkedNewBugs:\s*`([^`]+)`", 0)
          no_parent = get_int(r"- NewBugsNoParent:\s*`([^`]+)`", 0)
          parent_not_closed = get_int(r"- NewBugsParentNotClosed:\s*`([^`]+)`", 0)
          found_prod = get_int(r"- NewBugsFoundProd:\s*`([^`]+)`", 0)
          found_preprod = get_int(r"- NewBugsFoundPreProd:\s*`([^`]+)`", 0)
          top_no_parent = get(r"- TopNoParentIDs:\s*`([^`]+)`", "none")
          top_parent_not_closed = get(r"- TopParentNotClosedIDs:\s*`([^`]+)`", "none")

          if found_prod > 0:
              action_today = (
                  f"Escalate {found_prod} New bug(s) found in prod and triage ownership today."
              )
          elif no_parent > 0 or parent_not_closed > 0:
              action_today = "Prioritize linkage cleanup for unlinked New bugs today."
          else:
              action_today = "No critical blockers. Keep daily monitoring cadence."

          status_emoji = "🟢" if status == "OK" else "🟡"
          signal_emoji = "🚨" if signal == "ATTENTION" else "✅"

          message = "\n".join(
              [
                  f"*QA Daily Health Brief* {status_emoji} {signal_emoji}",
                  f"*Strict KPI:* `{metric}` = `{value}` ({numerator}/{denominator})",
                  f"*Period:* `{period}` | *Status:* `{status}`",
                  (
                      "*Data quality:* "
                      f"new total `{new_total}` | linked `{linked}` | "
                      f"no parent `{no_parent}` | parent not closed `{parent_not_closed}`"
                  ),
                  (
                      "*Risk lens:* "
                      f"new bugs found in prod `{found_prod}`, pre-prod `{found_preprod}`"
                  ),
                  (
                      "*Trend vs yesterday:* "
                      f"health `{trend_health}` | KPI `{trend_value}` | "
                      f"linked `{trend_linked}` | no parent `{trend_no_parent}` | prod `{trend_prod}`"
                  ),
                  f"*Top IDs (no parent):* `{top_no_parent}`",
                  f"*Top IDs (parent not closed):* `{top_parent_not_closed}`",
                  f"*Action today:* {action_today}",
              ]
          )

          slack_url = os.getenv("SLACK_WEBHOOK_URL", "").strip()
          slack_user_ids = os.getenv("SLACK_USER_IDS", "").strip()

          if not slack_url:
              print("No webhook configured; skip notification.")
              print(message)
              raise SystemExit(0)

          if slack_url:
              mentions = []
              if slack_user_ids:
                  users = [u.strip() for u in slack_user_ids.split(",") if u.strip()]
                  if users:
                      mentions = [f"<@{uid}>" for uid in users]
              mention_text = " ".join(mentions)
              slack_text = "\n".join([mention_text, message]).strip()
              resp = requests.post(
                  slack_url,
                  json={"text": slack_text},
                  timeout=15,
              )
              resp.raise_for_status()
              print("Slack notification sent.")
          PY
        displayName: Send Slack status notification
        env:
          SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK_URL)
          SLACK_USER_IDS: $(SLACK_USER_IDS)

