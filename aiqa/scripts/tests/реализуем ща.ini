### 4.1 Баги на PBI (Bugs per PBI)

- **Зачем сейчас**: базовая линия результата, понятна руководству, даёт тренд качества поставки.
- **Как собирать**: ежемесячная выгрузка из ADO (закрытые PBI за период) + число подтверждённых багов, связанных с этими PBI.
- **Что нужно в ALM**: связь бага к планированию по **контракту §5.2** (`primary_planning_ref`). Согласованный набор «подтверждённых» состояний (например, Confirmed/Done).
- **Знаменатель:** число PBI типа из **§5.2.2**, переведённых в **закрыто** в интервале дат, в отчётном проекте (скоуп выгрузки фиксируется в скрипте/отчёте).
- **Числитель:** число **подтверждённых** багов с `**BugType=New`**, у которых `primary_planning_ref` (§5.2) = PBI из знаменателя.
- **Карточка на дашборде**: линия за 3–6 месяцев + значение текущего месяца.

### 4.2 Легаси: открыто vs закрыто

- **Зачем сейчас**: базовая линия результата для легаси‑трека; показывает, “гасим ли пожар”.
- **Как собирать**: ежемесячно два счётчика для `**BugType=Legacy`**: **opened** и **closed** в периоде (идеально + net delta).
- **Что нужно в ALM**: обязательное поле `**BugType`** со значениями `New` / `Legacy` (см. §1); при наличии поля `legacy` — согласованность с `BugType` по правилу из §1.
- **Карточка на дашборде**: две колонки opened vs closed + линия net change.

### 4.3 Баги, пойманные до прода

- **Зачем сейчас**: показывает удержание дефектов без наказания за раннее обнаружение.
- **Как собирать**: ежемесячно подтверждённые баги с фильтрацией по:  
 `found_stage in {dev, qa, pre prod}`.
- **Что нужно в ALM**: `found_stage`.
- **Карточка на дашборде**: stacked bar (до прода vs прод).



### 4.4 Эффективность удаления дефектов (Release Testing Quality)

- **Зачем сейчас**: простой руководительский показатель удержания дефектов (вместе со срезом по стадиям).
- **Как собирать**: `pre-prod / (pre-prod + prod)` по периоду.
- **Что нужно в ALM**: `found_stage`.
- **Карточка на дашборде**: % текущий месяц + тренд.

**Примечание (важно про отличие DRE vs Escaped defect rate):**

--Escaped defect rate = prod / all confirmed — “доля пробоев в прод” среди всех подтверждённых--
- `DRE = pre-prod / (pre-prod + prod)` — “эффективность удаления до прода” в классическом смысле.

Если считать “all confirmed bugs” как “pre-prod + prod”, то эти две метрики становятся взаимодополняющими и согласованными по знаменателю.

### 4.5 Дисциплина ALM sign‑off (ворота) допилить чек-лист (DEV, LEAD)

- **Зачем сейчас**: без дисциплины sign‑off нельзя доверять остальным данным.
- **Как собирать**: еженедельно — выборка in-scope items и проверка: **item не закрывается без sign‑off** (Level 1) и ссылки на evidence.
- **Что нужно в ALM**: минимум: `qa_decision` + evidence link(s) или согласованный шаблон комментария.
- **Карточка на дашборде**: % items с sign‑off + список “нельзя закрывать” (missing sign‑off).

**Пояснение:** это не “метрика качества” и не “оценка команды”. Это **индикатор соблюдения ворот** (гигиена процесса), чтобы **не выпускать задачи без прохождения чеклиста**.

