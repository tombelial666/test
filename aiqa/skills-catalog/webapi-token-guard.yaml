id: webapi-token-guard
name: webapi-token-guard
maturity: review-grade
purpose: >
  Validate WebApi /api/token anti-bruteforce protections on a live non-prod stand:
  rate-limit behavior, Bloom precheck short-circuit, and X-Forwarded-For spoofing resistance.
when_to_use:
  - WebApi token guard hardening or regression checks are requested
  - need to confirm guard behavior on a live stand (not only unit tests)
out_of_scope:
  - production traffic tests
  - bypassing security controls
runners:
  - command: python -m pytest -v -m integration
    working_dir: qa/webapi_token_guard
inputs:
  env_required:
    - WA_BASE_URL
    - WA_TOKEN_PATH
    - WA_USERNAME
    - WA_PASSWORD
    - WA_APP_KEY
  env_optional:
    - WA_BURST_ATTEMPTS
    - WA_SLEEP_BETWEEN
    - WA_BURST_LOGIN
    - WA_BURST_WRONG_PASSWORD
endpoints:
  - method: POST
    url: "{WA_BASE_URL}{WA_TOKEN_PATH}"
    headers:
      - Username
      - Password
      - Et-App-Key
safety:
  no_secrets_in_repo: true
  non_prod_only: true
  burst_tests_are_opt_in: true
evidence_basis:
  - qa/webapi_token_guard/test_webapi_token_guard.py
  - qa/webapi_token_guard/README.md
  - ETNA_TRADER/src/Etna.Trader/Etna.Trader.WebApi.Core/RulesAuthentication/Handlers/AuthenticationPipeline.cs

