add_newline = true
command_timeout = 1000

# Clean, ASCII-first prompt.
# If you later enable Nerd Font, you can switch to a glyph-heavy theme safely.
format = """
[\\-](bold green)$os$username$hostname$directory$git_branch$git_status$nodejs$python$rust$docker_context$cmd_duration
[>](bold green) $character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold yellow)"

[username]
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_only = false
format = "on [$hostname](bold purple) "
disabled = false

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = false

[git_branch]
symbol = "git "
style = "bold purple"

[git_status]
style = "bold red"
conflicted = "=${count} "
ahead = "up${count} "
behind = "dn${count} "
diverged = "ud${ahead_count}/${behind_count} "
untracked = "?${count} "
stashed = "st${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "r${count} "
deleted = "x${count} "

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow) "

[nodejs]
symbol = "node "
format = "[$symbol($version)](bold green) "

[python]
symbol = "py "
format = "[$symbol($version)](bold yellow) "

[rust]
symbol = "rs "
format = "[$symbol($version)](bold red) "

[docker_context]
symbol = "docker "
format = "[$symbol$context](blue bold) "

